<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANPADS Tracking Viewer (WebSocket)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background: #1a1a1a; /* 深黑色背景 */
            color: #e0e0e0;      /* 淺灰文字 */
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 320px;
            grid-template-rows: 48px 1fr;
            height: 100vh;
            gap: 0;
        }

        .topbar {
            grid-column: 1 / -1;
            background: #333; /* Topbar 保持深色以利對比 */
            border-bottom: 1px solid #555;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
        }
        .topbar h1 {
            font-size: 16px;
            font-weight: 600;
            color: #00ccff;
            letter-spacing: 1px;
        }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #ff3333;
            animation: pulse 1.5s infinite;
        }
        .status-dot.connected { background: #00ff88; animation: none; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .scene-badge {
            background: #222;
            border: 1px solid #444;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #aaa;
        }
        .scene-badge span { color: #00ccff; font-weight: bold; }
        .ws-badge {
            background: #0a2a1a;
            border: 1px solid #00ff88;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 10px;
            color: #00ff88;
        }
        .control-btn {
            background: #222; border: 1px solid #444; color: #ccc;
            padding: 4px 10px; border-radius: 4px; cursor: pointer;
            font-family: inherit; font-size: 12px; transition: all 0.2s;
        }
        .control-btn:hover { background: #333; border-color: #666; color: #fff; }
        .control-btn:active { background: #444; }
        .control-btn.active { background: #004422; border-color: #00ff88; color: #00ff88; }
        .control-group { display: flex; gap: 5px; align-items: center; }
        .divider { width: 1px; height: 20px; background: #333; margin: 0 10px; }

        .viewport {
            position: relative;
            background: #1a1a1a;
        }
        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        .panel {
            background: #222; /* 面板深色 */
            border-left: 1px solid #333;
            overflow-y: auto;
            padding: 16px;
        }
        .panel-section { margin-bottom: 20px; }
        .panel-section h2 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 10px;
            border-bottom: 1px solid #444;
            padding-bottom: 6px;
        }

        .data-card {
            background: #111; /* 卡片更深 */
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .data-card .label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
        }
        .data-row .axis { color: #555; font-size: 12px; width: 20px; }
        .data-row .num { font-size: 13px; font-variant-numeric: tabular-nums; }
        .data-row .num.pos { color: #00ff88; }
        .data-row .num.rot { color: #ff8800; }

        .stability { display: flex; gap: 4px; align-items: center; margin-top: 6px; }
        .stability-bar { flex: 1; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .stability-fill { height: 100%; border-radius: 3px; }
        .stability-text { font-size: 11px; min-width: 70px; text-align: right; }
        .s0 { color: #ff3333; }
        .s1 { color: #ffaa00; }
        .s2 { color: #00ff88; }
        .s3 { color: #0088ff; }

        .io-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .io-pin { background: #222; border: 1px solid #333; border-radius: 4px; padding: 8px 4px; text-align: center; }
        .io-pin .pin-name { font-size: 9px; color: #666; margin-bottom: 4px; }
        .io-pin .pin-val { font-size: 16px; font-weight: bold; }
        .io-pin.on { background: #004422; border-color: #00ff88; }
        .io-pin.on .pin-val { color: #00ff88; }
        .io-pin.off .pin-val { color: #444; }
        .io-pin.output { border-color: #ff8800; }
        .io-pin.output.on { background: #442200; border-color: #ff8800; }
        .io-pin.output.on .pin-val { color: #ff8800; }

        .tracker-badge { display: inline-flex; align-items: center; gap: 6px; background: #222; border: 1px solid #333; border-radius: 4px; padding: 4px 10px; margin-bottom: 8px; }
        .tracker-badge .tid { color: #00ccff; font-weight: bold; font-size: 14px; }
        .tracker-badge .ttype { color: #888; font-size: 11px; }
        .no-data { color: #555; font-style: italic; font-size: 13px; padding: 20px; text-align: center; }

        .euler-row { display: flex; gap: 8px; margin-top: 6px; }
        .euler-item { flex: 1; text-align: center; background: #222; border-radius: 4px; padding: 4px; }
        .euler-item .axis { font-size: 10px; color: #555; }
        .euler-item .deg { font-size: 13px; color: #ff8800; }

        .model-orient { margin-bottom: 20px; }
        .model-orient h2 {
            font-size: 12px; text-transform: uppercase; letter-spacing: 2px;
            color: #888; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 6px;
        }
        .orient-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .orient-row .axis-label { color: #ff8800; font-size: 13px; font-weight: bold; width: 16px; }
        .orient-row input[type=range] {
            flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
            background: #333; border-radius: 2px; outline: none;
        }
        .orient-row input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: #ff8800; cursor: pointer;
        }
        .orient-row .deg-val { color: #ccc; font-size: 12px; width: 45px; text-align: right; font-variant-numeric: tabular-nums; }
        .orient-btns { display: flex; gap: 6px; margin-top: 6px; }
        .orient-btns button {
            flex: 1; background: #222; border: 1px solid #444; color: #aaa;
            padding: 4px 0; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px;
        }
        .orient-btns button:hover { background: #333; color: #fff; border-color: #666; }
        .orient-btns button.save-btn { border-color: #00ff88; color: #00ff88; }
        .orient-btns button.save-btn:hover { background: #004422; }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div class="status-dot" id="statusDot"></div>
            <h1>MANPADS TRACKING (WebSocket)</h1>
            <div class="ws-badge">WS v8 (Pipe)</div>
            
            <div class="divider"></div>
            <div class="control-group">
                <span style="font-size:11px;color:#666;">SCENE:</span>
                <button class="control-btn" onclick="sendCmd('1')">1</button>
                <button class="control-btn" onclick="sendCmd('2')">2</button>
                <button class="control-btn" onclick="sendCmd('3')">3</button>
            </div>
            <div class="scene-badge" style="margin-left:10px;">Current: <span id="sceneInfo">--</span></div>

            <div class="divider"></div>
            <div class="control-group">
                <span style="font-size:11px;color:#666;">AXIS FIX:</span>
                <button class="control-btn" id="btnFlipYaw" onclick="toggleFix('flipYaw')" title="Yaw +180° (前後顛倒修正)">Y+180</button>
                <button class="control-btn" id="btnInvPitch" onclick="toggleFix('invPitch')" title="反轉 Pitch (上下反向修正)">-P</button>
                <button class="control-btn" id="btnInvYaw" onclick="toggleFix('invYaw')" title="反轉 Yaw (左右反向修正)">-Y</button>
                <button class="control-btn" id="btnInvRoll" onclick="toggleFix('invRoll')" title="反轉 Roll">-R</button>
            </div>

            <div style="flex:1"></div>
            <div style="font-size:12px;color:#00ff88;" id="dataRate">-- Data/s</div>
            <div style="font-size:12px;color:#555;margin-left:15px;" id="fpsCounter">-- FPS</div>
        </div>

        <div class="viewport">
            <canvas id="canvas3d"></canvas>
        </div>

        <div class="panel">
            <div class="model-orient">
                <h2>Model Orientation</h2>
                <div class="orient-row">
                    <span class="axis-label">X</span>
                    <input type="range" id="orientX" min="-180" max="180" value="0" step="1" oninput="updateOrient()">
                    <span class="deg-val" id="orientXVal">0°</span>
                </div>
                <div class="orient-row">
                    <span class="axis-label">Y</span>
                    <input type="range" id="orientY" min="-180" max="180" value="0" step="1" oninput="updateOrient()">
                    <span class="deg-val" id="orientYVal">0°</span>
                </div>
                <div class="orient-row">
                    <span class="axis-label">Z</span>
                    <input type="range" id="orientZ" min="-180" max="180" value="0" step="1" oninput="updateOrient()">
                    <span class="deg-val" id="orientZVal">0°</span>
                </div>
                <div class="orient-btns">
                    <button onclick="resetOrient()">Reset</button>
                    <button class="save-btn" onclick="saveOrient()">Save</button>
                </div>
            </div>
            <div id="trackerPanels">
                <div class="no-data">Connecting to WebSocket...</div>
            </div>
            <div class="panel-section">
                <h2>IO Pins</h2>
                <div id="ioPanel">
                    <div class="no-data">No IO data</div>
                </div>
                <div style="margin-top:10px; text-align:center;">
                    <button class="control-btn" id="btnIO7" style="width:100%; padding:8px;" onclick="sendCmd('O')">TOGGLE IO7</button>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ---- Three.js Setup ----
    const canvas = document.getElementById('canvas3d');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x1a1a1a); // 背景保持黑色

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
    camera.position.set(3, 2.5, 3);
    camera.lookAt(0, 0.8, 0);

    const controls = new OrbitControls(camera, canvas);
    controls.target.set(0, 0.8, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.maxPolarAngle = Math.PI * 0.9;

    // Grid & Axes
    // Gray floor plane
    const floorGeo = new THREE.PlaneGeometry(6, 6);
    const floorMat = new THREE.MeshBasicMaterial({ color: 0x555555 }); // 33% 灰地板
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.001; // slightly below grid
    scene.add(floor);
    scene.add(new THREE.GridHelper(6, 30, 0xaaaaaa, 0x777777)); // 淺灰格線
    const axMat = (c) => new THREE.LineBasicMaterial({ color: c });
    function makeLine(from, to, color) {
        const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...from), new THREE.Vector3(...to)]);
        return new THREE.Line(g, axMat(color));
    }
    scene.add(makeLine([0,0,0], [2,0,0], 0xff3333));
    scene.add(makeLine([0,0,0], [0,2,0], 0x33ff33));
    scene.add(makeLine([0,0,0], [0,0,2], 0x3333ff));

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.6)); // 增強環境光
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 8, 5);
    scene.add(dirLight);
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6); // 增加半球光，增加立體感
    scene.add(hemiLight);

    // ---- Environment Pillars ----
    let pillarsBuilt = false;
    const pillarGroup = new THREE.Group();
    scene.add(pillarGroup);

    function decodeAntilatencyPillars(envString) {
        const prefix = 'AntilatencyAltEnvironmentPillars~';
        if (!envString || !envString.startsWith(prefix)) return null;

        let b64 = envString.slice(prefix.length);
        b64 = b64.replace(/-/g, '+').replace(/_/g, '/');
        while (b64.length % 4) b64 += '=';

        const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const view = new DataView(raw.buffer);

        const numPillars = raw[1];
        const pillars = [];

        for (let i = 0; i < numPillars; i++) {
            const off = 2 + i * 21;
            pillars.push({
                x: view.getFloat32(off, true),
                y: view.getFloat32(off + 4, true),
                z: view.getFloat32(off + 8, true),
                kind: raw[off + 12]
            });
        }

        const footerOff = 2 + numPillars * 21;
        const pillarLength = view.getFloat32(footerOff + 1, true);

        // Read proportions to find verticalOffset
        const numTypes = raw[footerOff];
        const numProps = raw[footerOff + 5];
        const strOff = footerOff + 6 + numProps * 5;
        const strLen = raw[strOff];
        const paramOff = strOff + 1 + strLen;
        const verticalOffset = view.getFloat32(paramOff + 4, true);

        return { pillars, pillarLength, verticalOffset };
    }

    function buildPillars(envData) {
        if (pillarsBuilt) return;
        const env = decodeAntilatencyPillars(envData);
        if (!env) return;
        pillarsBuilt = true;

        const kindColors = [0xff3388, 0x00ccff, 0xffaa00]; // A, B, C
        const kindLabels = ['A', 'B', 'C'];

        for (const p of env.pillars) {
            // Pillar bar (thin cylinder)
            const barGeo = new THREE.CylinderGeometry(0.008, 0.008, env.pillarLength, 8);
            const barMat = new THREE.MeshStandardMaterial({
                color: kindColors[p.kind] || 0xffffff,
                roughness: 0.3,
                metalness: 0.7,
                emissive: kindColors[p.kind] || 0xffffff,
                emissiveIntensity: 0.3
            });
            const bar = new THREE.Mesh(barGeo, barMat);
            const centerY = env.verticalOffset + env.pillarLength / 2;
            bar.position.set(p.x, centerY, p.z);
            pillarGroup.add(bar);

            // Top IR marker (small glowing sphere)
            const topSphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.012, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xff0044 })
            );
            topSphere.position.set(p.x, env.verticalOffset + env.pillarLength, p.z);
            pillarGroup.add(topSphere);

            // Bottom IR marker
            const botSphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.012, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xff0044 })
            );
            botSphere.position.set(p.x, env.verticalOffset, p.z);
            pillarGroup.add(botSphere);

            // Base plate
            const baseGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.005, 16);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.set(p.x, 0.0025, p.z);
            pillarGroup.add(base);
        }

        console.log(`[Pillars] Built ${env.pillars.length} pillars (h=${env.pillarLength}m, offset=${env.verticalOffset}m)`);
    }

    // Tracker objects
    const trackerObjects = {};
    const trackerColors = [0x00ff88, 0x00ccff, 0xff8800, 0xff3388, 0xaaff00];

    function getOrCreateTracker(id) {
        if (trackerObjects[id]) return trackerObjects[id];
        const group = new THREE.Group();
        const innerGroup = new THREE.Group();

        // --- XYZ Axis Arrows (same colors as scene axes) ---
        const arrowLen = 0.12;
        const headLen = 0.03;
        const headW = 0.012;

        // X = Red, Y = Green, Z = Blue
        innerGroup.add(new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(), arrowLen, 0xff3333, headLen, headW));
        innerGroup.add(new THREE.ArrowHelper(new THREE.Vector3(0,1,0), new THREE.Vector3(), arrowLen, 0x33ff33, headLen, headW));
        innerGroup.add(new THREE.ArrowHelper(new THREE.Vector3(0,0,1), new THREE.Vector3(), arrowLen, 0x3333ff, headLen, headW));

        // Small white sphere at origin
        const originSphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.008, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        innerGroup.add(originSphere);

        // Model orientation from sliders (loaded from localStorage)
        const orient = loadOrient();
        innerGroup.rotation.set(
            THREE.MathUtils.degToRad(orient.x),
            THREE.MathUtils.degToRad(orient.y),
            THREE.MathUtils.degToRad(orient.z)
        );

        group.add(innerGroup);
        scene.add(group);
        trackerObjects[id] = { group, innerGroup, targetPos: new THREE.Vector3(), targetQuat: new THREE.Quaternion(), initialized: false };
        return trackerObjects[id];
    }

    // Resize
    function onResize() {
        const viewport = document.querySelector('.viewport');
        camera.aspect = viewport.clientWidth / viewport.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(viewport.clientWidth, viewport.clientHeight);
    }
    window.addEventListener('resize', onResize);
    onResize();

    // ---- Model Orientation (localStorage) ----
    const ORIENT_KEY = 'fim92_model_orient';

    function loadOrient() {
        try {
            const saved = JSON.parse(localStorage.getItem(ORIENT_KEY));
            if (saved && typeof saved.x === 'number') return saved;
        } catch {}
        return { x: 0, y: -180, z: -90 }; // default
    }

    function applyOrientToAll() {
        const orient = loadOrient();
        const rx = THREE.MathUtils.degToRad(orient.x);
        const ry = THREE.MathUtils.degToRad(orient.y);
        const rz = THREE.MathUtils.degToRad(orient.z);
        for (const id in trackerObjects) {
            trackerObjects[id].innerGroup.rotation.set(rx, ry, rz);
        }
    }

    // Init sliders from saved values
    (function initOrientSliders() {
        const orient = loadOrient();
        const sx = document.getElementById('orientX');
        const sy = document.getElementById('orientY');
        const sz = document.getElementById('orientZ');
        if (sx) { sx.value = orient.x; document.getElementById('orientXVal').textContent = orient.x + '°'; }
        if (sy) { sy.value = orient.y; document.getElementById('orientYVal').textContent = orient.y + '°'; }
        if (sz) { sz.value = orient.z; document.getElementById('orientZVal').textContent = orient.z + '°'; }
    })();

    window.updateOrient = function() {
        const x = parseInt(document.getElementById('orientX').value);
        const y = parseInt(document.getElementById('orientY').value);
        const z = parseInt(document.getElementById('orientZ').value);
        document.getElementById('orientXVal').textContent = x + '°';
        document.getElementById('orientYVal').textContent = y + '°';
        document.getElementById('orientZVal').textContent = z + '°';
        // Live preview: temporarily apply without saving
        const rx = THREE.MathUtils.degToRad(x);
        const ry = THREE.MathUtils.degToRad(y);
        const rz = THREE.MathUtils.degToRad(z);
        for (const id in trackerObjects) {
            trackerObjects[id].innerGroup.rotation.set(rx, ry, rz);
        }
    };

    window.saveOrient = function() {
        const x = parseInt(document.getElementById('orientX').value);
        const y = parseInt(document.getElementById('orientY').value);
        const z = parseInt(document.getElementById('orientZ').value);
        localStorage.setItem(ORIENT_KEY, JSON.stringify({ x, y, z }));
        console.log('[Orient] Saved:', { x, y, z });
    };

    window.resetOrient = function() {
        const def = { x: 0, y: -180, z: -90 };
        document.getElementById('orientX').value = def.x;
        document.getElementById('orientY').value = def.y;
        document.getElementById('orientZ').value = def.z;
        document.getElementById('orientXVal').textContent = def.x + '°';
        document.getElementById('orientYVal').textContent = def.y + '°';
        document.getElementById('orientZVal').textContent = def.z + '°';
        localStorage.setItem(ORIENT_KEY, JSON.stringify(def));
        applyOrientToAll();
    };

    // Helpers
    function quatToEulerDeg(x, y, z, w) {
        const euler = new THREE.Euler();
        euler.setFromQuaternion(new THREE.Quaternion(x, y, z, w), 'YXZ');
        return { pitch: THREE.MathUtils.radToDeg(euler.x), yaw: THREE.MathUtils.radToDeg(euler.y), roll: THREE.MathUtils.radToDeg(euler.z) };
    }

    // ---- Axis Correction (localStorage) ----
    const AXISFIX_KEY = 'fim92_axis_fix';
    const axisFix = (function loadAxisFix() {
        try {
            const saved = JSON.parse(localStorage.getItem(AXISFIX_KEY));
            if (saved && typeof saved.flipYaw === 'boolean') return saved;
        } catch {}
        return { flipYaw: false, invPitch: false, invYaw: true, invRoll: false }; // default: invYaw on
    })();

    // Init button states on load
    (function initAxisFixButtons() {
        const btnMap = { flipYaw: 'btnFlipYaw', invPitch: 'btnInvPitch', invYaw: 'btnInvYaw', invRoll: 'btnInvRoll' };
        for (const key in btnMap) {
            const btn = document.getElementById(btnMap[key]);
            if (btn && axisFix[key]) btn.classList.add('active');
        }
    })();

    window.toggleFix = function(key) {
        axisFix[key] = !axisFix[key];
        const btnMap = { flipYaw: 'btnFlipYaw', invPitch: 'btnInvPitch', invYaw: 'btnInvYaw', invRoll: 'btnInvRoll' };
        const btn = document.getElementById(btnMap[key]);
        if (btn) btn.classList.toggle('active', axisFix[key]);
        localStorage.setItem(AXISFIX_KEY, JSON.stringify(axisFix));
        console.log('[AxisFix]', JSON.stringify(axisFix));
    };

    function applyAxisCorrection(rx, ry, rz, rw) {
        // Convert quaternion to Euler (YXZ)
        const euler = new THREE.Euler();
        euler.setFromQuaternion(new THREE.Quaternion(rx, ry, rz, rw), 'YXZ');

        let pitch = euler.x;
        let yaw = euler.y;
        let roll = euler.z;

        // Apply corrections
        if (axisFix.flipYaw) yaw += Math.PI;       // Yaw +180° (前後顛倒)
        if (axisFix.invPitch) pitch = -pitch;       // 反轉 Pitch (上下反向)
        if (axisFix.invYaw) yaw = -yaw;             // 反轉 Yaw (左右反向)
        if (axisFix.invRoll) roll = -roll;           // 反轉 Roll

        // Convert back to quaternion
        const correctedEuler = new THREE.Euler(pitch, yaw, roll, 'YXZ');
        const correctedQuat = new THREE.Quaternion();
        correctedQuat.setFromEuler(correctedEuler);
        return correctedQuat;
    }

    const stabilityNames = ['InertialInit', '3DOF', '6DOF', 'Blind6DOF'];
    const stabilityColors = ['#ff3333', '#ffaa00', '#00ff88', '#0088ff'];
    const stabilityPercent = [10, 40, 100, 70];
    const ioPinNames = ['IO1', 'IO2', 'IOA3', 'IOA4', 'IO5', 'IO6', 'IO8'];
    let builtTrackerIds = [];
    let builtIOConnected = null;

    function buildTrackerDOM(trackers) {
        const container = document.getElementById('trackerPanels');
        const ids = trackers.map(t => t.id).sort().join(',');
        if (ids === builtTrackerIds.join(',')) return;
        builtTrackerIds = trackers.map(t => t.id).sort();
        if (trackers.length === 0) { container.innerHTML = '<div class="no-data">No trackers</div>'; return; }
        let html = '';
        for (const t of trackers) {
            const label = t.number || ('#' + t.id);
            html += `<div class="panel-section" id="tp-${t.id}"><h2>Tracker</h2><div class="tracker-badge"><span class="tid" id="tl-${t.id}">${label}</span><span class="ttype" id="tt-${t.id}">${t.type||'--'}</span></div><div class="data-card"><div class="label">Position (m)</div><div class="data-row"><span class="axis">X</span><span class="num pos" id="px-${t.id}">0</span></div><div class="data-row"><span class="axis">Y</span><span class="num pos" id="py-${t.id}">0</span></div><div class="data-row"><span class="axis">Z</span><span class="num pos" id="pz-${t.id}">0</span></div></div><div class="data-card"><div class="label">Rotation (quat)</div><div class="data-row"><span class="axis">X</span><span class="num rot" id="rx-${t.id}">0</span></div><div class="data-row"><span class="axis">Y</span><span class="num rot" id="ry-${t.id}">0</span></div><div class="data-row"><span class="axis">Z</span><span class="num rot" id="rz-${t.id}">0</span></div><div class="data-row"><span class="axis">W</span><span class="num rot" id="rw-${t.id}">0</span></div><div class="euler-row"><div class="euler-item"><div class="axis">P</div><div class="deg" id="ep-${t.id}">0</div></div><div class="euler-item"><div class="axis">Y</div><div class="deg" id="ey-${t.id}">0</div></div><div class="euler-item"><div class="axis">R</div><div class="deg" id="er-${t.id}">0</div></div></div></div><div class="data-card"><div class="label">Stability</div><div class="stability"><div class="stability-bar"><div class="stability-fill" id="sf-${t.id}"></div></div><div class="stability-text" id="st-${t.id}">--</div></div></div></div>`;
        }
        container.innerHTML = html;
    }

    function updateTrackerValues(t) {
        // Apply axis correction to quaternion
        const correctedQuat = applyAxisCorrection(t.rx, t.ry, t.rz, t.rw);
        const cq = correctedQuat;

        const euler = quatToEulerDeg(cq.x, cq.y, cq.z, cq.w);
        const sColor = stabilityColors[t.stability] || '#555';
        const sPct = stabilityPercent[t.stability] || 0;
        const sName = stabilityNames[t.stability] || '?';

        const el = (id) => document.getElementById(id);
        const set = (id, v) => { const e = el(id); if (e) e.textContent = v; };

        set('px-'+t.id, t.px.toFixed(4)); set('py-'+t.id, t.py.toFixed(4)); set('pz-'+t.id, t.pz.toFixed(4));
        set('rx-'+t.id, cq.x.toFixed(4)); set('ry-'+t.id, cq.y.toFixed(4)); set('rz-'+t.id, cq.z.toFixed(4)); set('rw-'+t.id, cq.w.toFixed(4));
        set('ep-'+t.id, euler.pitch.toFixed(1)+'°'); set('ey-'+t.id, euler.yaw.toFixed(1)+'°'); set('er-'+t.id, euler.roll.toFixed(1)+'°');

        const sf = el('sf-'+t.id), st = el('st-'+t.id);
        if (sf) { sf.style.width = sPct+'%'; sf.style.background = sColor; }
        if (st) { st.textContent = 'S:'+t.stability+' '+sName; st.className = 'stability-text s'+t.stability; }

        const obj = getOrCreateTracker(t.id);
        if (!obj.initialized) { obj.group.position.set(t.px, t.py, t.pz); obj.group.quaternion.copy(cq); obj.initialized = true; }
        obj.targetPos.set(t.px, t.py, t.pz);
        obj.targetQuat.copy(cq);
    }

    function buildIODOM(io) {
        const ioPanel = document.getElementById('ioPanel');
        if (!io.connected) { if (builtIOConnected !== false) { ioPanel.innerHTML = '<div class="no-data">IO not connected</div>'; builtIOConnected = false; } return; }
        if (builtIOConnected === true) return;
        builtIOConnected = true;
        let html = '<div class="io-grid">';
        for (let i = 0; i < ioPinNames.length; i++) html += `<div class="io-pin off" id="iop-${i}"><div class="pin-name">${ioPinNames[i]}</div><div class="pin-val" id="iov-${i}">0</div></div>`;
        html += `<div class="io-pin output off" id="iop-7"><div class="pin-name">IO7</div><div class="pin-val" id="iov-7">OFF</div></div></div>`;
        if (io.type) html += `<div style="margin-top:8px;font-size:11px;color:#555;">Module: <span style="color:#aaa;">${io.type}</span></div>`;
        ioPanel.innerHTML = html;
    }

    function updateIOValues(io) {
        if (!io.connected) return;
        for (let i = 0; i < ioPinNames.length; i++) {
            const pin = document.getElementById('iop-'+i), val = document.getElementById('iov-'+i);
            if (pin && val) { val.textContent = io.inputs[i]; pin.className = 'io-pin '+(io.inputs[i]?'on':'off'); }
        }
        const pin7 = document.getElementById('iop-7'), val7 = document.getElementById('iov-7');
        if (pin7 && val7) { val7.textContent = io.io7out?'ON':'OFF'; pin7.className = 'io-pin output '+(io.io7out?'on':'off'); }
    }
    
    // Global function for buttons
    window.sendCmd = function(key) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'keypress', key: key }));
            console.log('Sent command:', key);
        }
    };

    // ---- WebSocket Connection ----
    let ws = null;
    let connected = false;
    let dataCount = 0;
    let lastDataRateTime = performance.now();
    let frameCount = 0;
    let lastFpsTime = performance.now();

    function connectWebSocket() {
        // Support remote host: viewer_ws.html?host=192.168.1.100
        const wsHost = new URLSearchParams(window.location.search).get('host') || window.location.hostname || 'localhost';
        ws = new WebSocket('ws://' + wsHost + ':8765');

        ws.onopen = () => {
            connected = true;
            document.getElementById('statusDot').classList.add('connected');
            console.log('[WS] Connected');
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);

                // 計算資料更新率
                dataCount++;
                const now = performance.now();
                if (now - lastDataRateTime > 1000) {
                    const rate = Math.round(dataCount * 1000 / (now - lastDataRateTime));
                    document.getElementById('dataRate').textContent = rate + ' Data/s';
                    document.getElementById('dataRate').style.color = rate >= 80 ? '#00ff88' : rate >= 50 ? '#ffaa00' : '#ff3333';
                    dataCount = 0;
                    lastDataRateTime = now;
                }

                document.getElementById('sceneInfo').textContent = 'S' + data.scene + ' ' + (data.sceneName || '');
                if (data.envData) buildPillars(data.envData);
                buildTrackerDOM(data.trackers);
                buildIODOM(data.io);
                for (const t of data.trackers) updateTrackerValues(t);
                updateIOValues(data.io);

            } catch (e) {
                console.error('[WS] Parse error:', e);
            }
        };

        ws.onclose = () => {
            connected = false;
            document.getElementById('statusDot').classList.remove('connected');
            console.log('[WS] Disconnected, reconnecting in 1s...');
            setTimeout(connectWebSocket, 1000);
        };

        ws.onerror = (e) => {
            console.error('[WS] Error:', e);
            ws.close();
        };
    }

    // ---- Animation Loop ----
    let lastFrameTime = performance.now();
    let rawMode = false;
    const SMOOTHING = 0.7; // WebSocket 版本可以用更高的平滑因子

    function animate() {
        requestAnimationFrame(animate);
        const now = performance.now();
        const deltaTime = Math.min((now - lastFrameTime) / 16.67, 3);
        lastFrameTime = now;

        for (const id in trackerObjects) {
            const obj = trackerObjects[id];
            if (!obj.initialized) continue;
            if (rawMode) {
                obj.group.position.copy(obj.targetPos);
                obj.group.quaternion.copy(obj.targetQuat);
            } else {
                const sf = 1 - Math.pow(1 - SMOOTHING, deltaTime);
                obj.group.position.lerp(obj.targetPos, sf);
                obj.group.quaternion.slerp(obj.targetQuat, sf);
            }
        }

        controls.update();
        renderer.render(scene, camera);

        frameCount++;
        if (now - lastFpsTime > 1000) {
            document.getElementById('fpsCounter').textContent = Math.round(frameCount * 1000 / (now - lastFpsTime)) + ' FPS';
            frameCount = 0;
            lastFpsTime = now;
        }
    }

    animate();
    connectWebSocket();

    </script>
</body>
