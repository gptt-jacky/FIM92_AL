<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIM92 Tracking Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 320px;
            grid-template-rows: 48px 1fr;
            height: 100vh;
            gap: 0;
        }

        /* Top bar */
        .topbar {
            grid-column: 1 / -1;
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
        }
        .topbar h1 {
            font-size: 16px;
            font-weight: 600;
            color: #00ff88;
            letter-spacing: 1px;
        }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #ff3333;
            animation: pulse 1.5s infinite;
        }
        .status-dot.connected { background: #00ff88; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .scene-badge {
            background: #1a1a2e;
            border: 1px solid #444;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #aaa;
        }
        .scene-badge span { color: #00ccff; font-weight: bold; }

        /* 3D viewport */
        .viewport {
            position: relative;
            background: #0d0d0d;
        }
        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Right panel */
        .panel {
            background: #111;
            border-left: 1px solid #333;
            overflow-y: auto;
            padding: 16px;
        }
        .panel-section {
            margin-bottom: 20px;
        }
        .panel-section h2 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 10px;
            border-bottom: 1px solid #222;
            padding-bottom: 6px;
        }

        /* Data cards */
        .data-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .data-card .label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
        }
        .data-row .axis { color: #555; font-size: 12px; width: 20px; }
        .data-row .num { font-size: 13px; font-variant-numeric: tabular-nums; }
        .data-row .num.pos { color: #00ff88; }
        .data-row .num.rot { color: #ff8800; }

        /* Stability */
        .stability {
            display: flex;
            gap: 4px;
            align-items: center;
            margin-top: 6px;
        }
        .stability-bar {
            flex: 1;
            height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
        }
        .stability-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.2s, background 0.2s;
        }
        .stability-text {
            font-size: 11px;
            min-width: 70px;
            text-align: right;
        }
        .s0 { color: #ff3333; }
        .s1 { color: #ffaa00; }
        .s2 { color: #00ff88; }
        .s3 { color: #0088ff; }

        /* IO Panel */
        .io-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .io-pin {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 8px 4px;
            text-align: center;
            transition: all 0.1s;
        }
        .io-pin .pin-name {
            font-size: 9px;
            color: #666;
            margin-bottom: 4px;
        }
        .io-pin .pin-val {
            font-size: 16px;
            font-weight: bold;
        }
        .io-pin.on {
            background: #0a2a0a;
            border-color: #00ff88;
        }
        .io-pin.on .pin-val { color: #00ff88; }
        .io-pin.off .pin-val { color: #333; }

        .io-pin.output {
            border-color: #ff8800;
        }
        .io-pin.output.on {
            background: #2a1a0a;
            border-color: #ff8800;
        }
        .io-pin.output.on .pin-val { color: #ff8800; }

        /* Tracker badge */
        .tracker-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 4px 10px;
            margin-bottom: 8px;
        }
        .tracker-badge .tid { color: #00ccff; font-weight: bold; font-size: 14px; }
        .tracker-badge .ttype { color: #888; font-size: 11px; }

        .no-data {
            color: #333;
            font-style: italic;
            font-size: 13px;
            padding: 20px;
            text-align: center;
        }

        /* Euler angles */
        .euler-row {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .euler-item {
            flex: 1;
            text-align: center;
            background: #151515;
            border-radius: 4px;
            padding: 4px;
        }
        .euler-item .axis { font-size: 10px; color: #555; }
        .euler-item .deg { font-size: 13px; color: #ff8800; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Bar -->
        <div class="topbar">
            <div class="status-dot" id="statusDot"></div>
            <h1>FIM92 TRACKING VIEWER</h1>
            <div class="scene-badge">Scene: <span id="sceneInfo">--</span></div>
            <div style="flex:1"></div>
            <div style="font-size:12px;color:#555;" id="fpsCounter">-- FPS</div>
        </div>

        <!-- 3D Viewport -->
        <div class="viewport">
            <canvas id="canvas3d"></canvas>
        </div>

        <!-- Right Panel -->
        <div class="panel">
            <div id="trackerPanels">
                <div class="no-data">Waiting for tracking data...</div>
            </div>

            <!-- IO Section -->
            <div class="panel-section">
                <h2>IO Pins</h2>
                <div id="ioPanel">
                    <div class="no-data">No IO data</div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ---- Three.js Setup ----
    const canvas = document.getElementById('canvas3d');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x0d0d0d);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
    camera.position.set(3, 2.5, 3);
    camera.lookAt(0, 0.8, 0);

    const controls = new OrbitControls(camera, canvas);
    controls.target.set(0, 0.8, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    // ---- Grid & Axes ----
    const gridHelper = new THREE.GridHelper(6, 30, 0x222222, 0x181818);
    scene.add(gridHelper);

    const axisLen = 2;
    const axMat = (c) => new THREE.LineBasicMaterial({ color: c });
    function makeLine(from, to, color) {
        const g = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(...from), new THREE.Vector3(...to)
        ]);
        return new THREE.Line(g, axMat(color));
    }
    scene.add(makeLine([0,0,0], [axisLen,0,0], 0xff3333));
    scene.add(makeLine([0,0,0], [0,axisLen,0], 0x33ff33));
    scene.add(makeLine([0,0,0], [0,0,axisLen], 0x3333ff));

    // ---- Lighting ----
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 8, 5);
    scene.add(dirLight);

    // ---- Tracker 3D objects ----
    // Each tracker stores: { group, targetPos, targetQuat }
    const trackerObjects = {};
    const trackerColors = [0x00ff88, 0x00ccff, 0xff8800, 0xff3388, 0xaaff00];
    const LERP_FACTOR = 0.1; // interpolation speed per frame (lower = smoother)

    function getOrCreateTracker(id) {
        if (trackerObjects[id]) return trackerObjects[id];

        const colorIndex = (id - 1) % trackerColors.length;
        const color = trackerColors[colorIndex];

        const group = new THREE.Group();

        // Main body - box (width=X, height=Y, depth=Z)
        const bodyGeo = new THREE.BoxGeometry(0.15, 0.06, 0.25);
        const bodyMat = new THREE.MeshPhongMaterial({
            color: color,
            transparent: true,
            opacity: 0.85,
            flatShading: true
        });
        group.add(new THREE.Mesh(bodyGeo, bodyMat));

        // Wireframe
        const wireGeo = new THREE.BoxGeometry(0.15, 0.06, 0.25);
        const wireMat = new THREE.MeshBasicMaterial({ color: color, wireframe: true });
        group.add(new THREE.Mesh(wireGeo, wireMat));

        // Local axes
        const aLen = 0.3;
        group.add(makeLine([0,0,0], [aLen,0,0], 0xff4444));
        group.add(makeLine([0,0,0], [0,aLen,0], 0x44ff44));
        group.add(makeLine([0,0,0], [0,0,aLen], 0x4444ff));

        // Forward indicator (Z arrow)
        const arrowGeo = new THREE.ConeGeometry(0.02, 0.06, 8);
        const arrowMat = new THREE.MeshBasicMaterial({ color: 0x4444ff });
        const arrow = new THREE.Mesh(arrowGeo, arrowMat);
        arrow.rotation.x = -Math.PI / 2;
        arrow.position.z = 0.16; // Corrected for model depth of 0.25
        group.add(arrow);

        scene.add(group);
        trackerObjects[id] = {
            group,
            targetPos: new THREE.Vector3(),
            targetQuat: new THREE.Quaternion()
        };
        return trackerObjects[id];
    }

    // ---- Resize ----
    function onResize() {
        const viewport = document.querySelector('.viewport');
        const w = viewport.clientWidth;
        const h = viewport.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);
    onResize();

    // ---- Quaternion to Euler (degrees) ----
    function quatToEulerDeg(x, y, z, w) {
        const euler = new THREE.Euler();
        const q = new THREE.Quaternion(x, y, z, w);
        euler.setFromQuaternion(q, 'YXZ');
        return {
            pitch: THREE.MathUtils.radToDeg(euler.x),
            yaw:   THREE.MathUtils.radToDeg(euler.y),
            roll:  THREE.MathUtils.radToDeg(euler.z)
        };
    }

    // ---- Stability info ----
    const stabilityNames = ['InertialInit', '3DOF', '6DOF', 'Blind6DOF'];
    const stabilityColors = ['#ff3333', '#ffaa00', '#00ff88', '#0088ff'];
    const stabilityPercent = [10, 40, 100, 70];

    // ---- IO pin names ----
    const ioPinNames = ['IO1', 'IO2', 'IOA3', 'IOA4', 'IO5', 'IO6', 'IO8'];

    // ---- Cached DOM refs for targeted updates ----
    let builtTrackerIds = [];  // which tracker IDs have DOM built
    let builtIOConnected = null;

    function buildTrackerDOM(trackers) {
        const container = document.getElementById('trackerPanels');
        const ids = trackers.map(t => t.id).sort().join(',');
        const currentIds = builtTrackerIds.join(',');
        if (ids === currentIds) return; // structure unchanged

        builtTrackerIds = trackers.map(t => t.id).sort();

        if (trackers.length === 0) {
            container.innerHTML = '<div class="no-data">No trackers connected</div>';
            return;
        }

        let html = '';
        for (const t of trackers) {
            const label = t.number || ('#' + t.id);
            html += `
            <div class="panel-section" id="tp-${t.id}">
                <h2>Tracker</h2>
                <div class="tracker-badge">
                    <span class="tid" id="tl-${t.id}">${label}</span>
                    <span class="ttype" id="tt-${t.id}">${t.type || '--'}</span>
                </div>
                <div class="data-card">
                    <div class="label">Position (meters)</div>
                    <div class="data-row"><span class="axis">X</span><span class="num pos" id="px-${t.id}">0</span></div>
                    <div class="data-row"><span class="axis">Y</span><span class="num pos" id="py-${t.id}">0</span></div>
                    <div class="data-row"><span class="axis">Z</span><span class="num pos" id="pz-${t.id}">0</span></div>
                </div>
                <div class="data-card">
                    <div class="label">Rotation (quaternion)</div>
                    <div class="data-row"><span class="axis">X</span><span class="num rot" id="rx-${t.id}">0</span></div>
                    <div class="data-row"><span class="axis">Y</span><span class="num rot" id="ry-${t.id}">0</span></div>
                    <div class="data-row"><span class="axis">Z</span><span class="num rot" id="rz-${t.id}">0</span></div>
                    <div class="data-row"><span class="axis">W</span><span class="num rot" id="rw-${t.id}">0</span></div>
                    <div class="euler-row">
                        <div class="euler-item"><div class="axis">Pitch</div><div class="deg" id="ep-${t.id}">0</div></div>
                        <div class="euler-item"><div class="axis">Yaw</div><div class="deg" id="ey-${t.id}">0</div></div>
                        <div class="euler-item"><div class="axis">Roll</div><div class="deg" id="er-${t.id}">0</div></div>
                    </div>
                </div>
                <div class="data-card">
                    <div class="label">Stability</div>
                    <div class="stability">
                        <div class="stability-bar"><div class="stability-fill" id="sf-${t.id}"></div></div>
                        <div class="stability-text" id="st-${t.id}">--</div>
                    </div>
                </div>
            </div>`;
        }
        container.innerHTML = html;
    }

    function updateTrackerValues(t) {
        const euler = quatToEulerDeg(t.rx, t.ry, t.rz, t.rw);
        const sName = stabilityNames[t.stability] || '?';
        const sColor = stabilityColors[t.stability] || '#555';
        const sPct = stabilityPercent[t.stability] || 0;

        // Update label if Number changed
        const labelEl = document.getElementById('tl-' + t.id);
        if (labelEl) {
            const newLabel = t.number || ('#' + t.id);
            if (labelEl.textContent !== newLabel) labelEl.textContent = newLabel;
        }

        // Position
        const px = document.getElementById('px-' + t.id);
        const py = document.getElementById('py-' + t.id);
        const pz = document.getElementById('pz-' + t.id);
        if (px) px.textContent = t.px.toFixed(4);
        if (py) py.textContent = t.py.toFixed(4);
        if (pz) pz.textContent = t.pz.toFixed(4);

        // Rotation
        const rx = document.getElementById('rx-' + t.id);
        const ry = document.getElementById('ry-' + t.id);
        const rz = document.getElementById('rz-' + t.id);
        const rw = document.getElementById('rw-' + t.id);
        if (rx) rx.textContent = t.rx.toFixed(4);
        if (ry) ry.textContent = t.ry.toFixed(4);
        if (rz) rz.textContent = t.rz.toFixed(4);
        if (rw) rw.textContent = t.rw.toFixed(4);

        // Euler
        const ep = document.getElementById('ep-' + t.id);
        const ey = document.getElementById('ey-' + t.id);
        const er = document.getElementById('er-' + t.id);
        if (ep) ep.textContent = euler.pitch.toFixed(1) + '\u00B0';
        if (ey) ey.textContent = euler.yaw.toFixed(1) + '\u00B0';
        if (er) er.textContent = euler.roll.toFixed(1) + '\u00B0';

        // Stability
        const sf = document.getElementById('sf-' + t.id);
        const st = document.getElementById('st-' + t.id);
        if (sf) { sf.style.width = sPct + '%'; sf.style.background = sColor; }
        if (st) { st.textContent = 'S:' + t.stability + ' ' + sName; st.className = 'stability-text s' + t.stability; }

        // 3D object - set target for interpolation
        const obj = getOrCreateTracker(t.id);
        obj.targetPos.set(t.px, t.py, t.pz);
        obj.targetQuat.set(t.rx, t.ry, t.rz, t.rw);
    }

    function buildIODOM(io) {
        const ioPanel = document.getElementById('ioPanel');
        if (!io.connected) {
            if (builtIOConnected !== false) {
                ioPanel.innerHTML = '<div class="no-data">IO not connected</div>';
                builtIOConnected = false;
            }
            return;
        }
        if (builtIOConnected === true) return; // already built

        builtIOConnected = true;
        let html = '<div class="io-grid">';
        for (let i = 0; i < ioPinNames.length; i++) {
            html += `<div class="io-pin off" id="iop-${i}">
                <div class="pin-name">${ioPinNames[i]}</div>
                <div class="pin-val" id="iov-${i}">0</div>
            </div>`;
        }
        html += `<div class="io-pin output off" id="iop-7">
            <div class="pin-name">IO7 OUT</div>
            <div class="pin-val" id="iov-7">OFF</div>
        </div></div>`;
        if (io.type) {
            html += `<div style="margin-top:8px;font-size:11px;color:#555;">Module: <span style="color:#aaa;" id="io-type">${io.type}</span></div>`;
        }
        ioPanel.innerHTML = html;
    }

    function updateIOValues(io) {
        if (!io.connected) return;
        for (let i = 0; i < ioPinNames.length; i++) {
            const pin = document.getElementById('iop-' + i);
            const val = document.getElementById('iov-' + i);
            if (!pin || !val) continue;
            const v = io.inputs[i];
            val.textContent = v;
            pin.className = 'io-pin ' + (v ? 'on' : 'off');
        }
        const pin7 = document.getElementById('iop-7');
        const val7 = document.getElementById('iov-7');
        if (pin7 && val7) {
            const on = io.io7out;
            val7.textContent = on ? 'ON' : 'OFF';
            pin7.className = 'io-pin output ' + (on ? 'on' : 'off');
        }
    }

    // ---- Data fetching ----
    let lastData = null;
    let connected = false;
    let frameCount = 0;
    let lastFpsTime = performance.now();
    let fetchInFlight = false;

    async function fetchData() {
        if (fetchInFlight) return; // skip if previous fetch still running
        fetchInFlight = true;
        try {
            const resp = await fetch('tracking_data.json?t=' + Date.now());
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            lastData = data;
            if (!connected) {
                connected = true;
                document.getElementById('statusDot').classList.add('connected');
            }
            // Update scene info
            document.getElementById('sceneInfo').textContent =
                'S' + data.scene + ' ' + (data.sceneName || '');

            // Build DOM structure if tracker list changed
            buildTrackerDOM(data.trackers);
            // Build IO DOM if connection status changed
            buildIODOM(data.io);

            // Update values (cheap textContent updates only)
            for (const t of data.trackers) {
                updateTrackerValues(t);
            }
            updateIOValues(data.io);

        } catch (e) {
            if (connected) {
                connected = false;
                document.getElementById('statusDot').classList.remove('connected');
            }
        }
        fetchInFlight = false;
    }

    // ---- Animation loop (only 3D rendering + interpolation) ----
    function animate() {
        requestAnimationFrame(animate);

        // Interpolate 3D objects toward their targets
        for (const id in trackerObjects) {
            const t = trackerObjects[id];
            t.group.position.lerp(t.targetPos, LERP_FACTOR);
            t.group.quaternion.slerp(t.targetQuat, LERP_FACTOR);
        }

        controls.update();
        renderer.render(scene, camera);

        // FPS counter
        frameCount++;
        const now = performance.now();
        if (now - lastFpsTime > 1000) {
            document.getElementById('fpsCounter').textContent =
                Math.round(frameCount * 1000 / (now - lastFpsTime)) + ' FPS';
            frameCount = 0;
            lastFpsTime = now;
        }
    }
    animate();

    // Poll data at ~30Hz
    setInterval(fetchData, 33);
    fetchData();

    </script>
</body>
</html>
